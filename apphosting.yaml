# Firebase App Hosting config for Finia (full-stack: Vite client + Express/Node server).
# App Hosting runs `npm run build` then `npm run start` (node dist/server.cjs),
# which serves the built client from dist/ AND the /api/* routes on $PORT.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0      # scale to zero when idle (cheapest); bump to 1 to kill cold starts
  maxInstances: 2
  concurrency: 80

env:
  # Production mode -> server.ts serves dist/ statically instead of the Vite dev middleware.
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # ---- AI backend (Vertex AI in production) ----
  # server.ts makeGenAI() reads GEMINI_BACKEND to choose its Gemini client. In
  # production we use FULL Vertex AI with the App Hosting runtime service account
  # (Application Default Credentials) — no API key is sent. One-time setup before
  # the first deploy with this config:
  #   1. Enable billing + the Vertex AI API (aiplatform.googleapis.com) on the project.
  #   2. Grant the App Hosting backend's runtime service account roles/aiplatform.user:
  #        gcloud projects add-iam-policy-binding gen-lang-client-0144814356 \
  #          --member="serviceAccount:<RUNTIME_SA_EMAIL>" --role="roles/aiplatform.user"
  #      (find <RUNTIME_SA_EMAIL> in Firebase console -> App Hosting -> backend -> Settings)
  # Docs: https://firebase.google.com/docs/app-hosting/configure
  - variable: GEMINI_BACKEND
    value: vertex
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: gen-lang-client-0144814356
    availability:
      - RUNTIME
  - variable: VERTEX_LOCATION
    value: us-central1
    availability:
      - RUNTIME

  # ---- Public Firebase web config ----
  # Vite inlines VITE_* into the CLIENT bundle at BUILD time, so these MUST be
  # present during build. They are public (shipped in the browser bundle anyway),
  # so plain values committed here are fine. Paste your values from .env.local.
  - variable: VITE_FIREBASE_API_KEY
    value: AIzaSyA6o_GUXJM9gXRMagBLMSuqLbUFLDAH39w
    availability: [BUILD]
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: gen-lang-client-0144814356.firebaseapp.com
    availability: [BUILD]
  - variable: VITE_FIREBASE_PROJECT_ID
    value: gen-lang-client-0144814356
    availability: [BUILD]
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: gen-lang-client-0144814356.firebasestorage.app
    availability: [BUILD]
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: "762990677270"
    availability: [BUILD]
  - variable: VITE_FIREBASE_APP_ID
    value: "1:762990677270:web:2e2b09eb0c871daf1d5437"
    availability: [BUILD]
  # Web push VAPID key — not set yet. FCM web push stays off until you add it
  # (Firebase console -> Project settings -> Cloud Messaging -> Web Push certificates).
  # Everything else works without it.

  # ---- Server-side secret (only used when GEMINI_BACKEND=aistudio) ----
  # Ignored under the vertex / vertex-express backends above. Kept so you can fall
  # back to the AI Studio key by flipping GEMINI_BACKEND to "aistudio".
  # The Gemini key is used ONLY by the Express server (server.ts), at runtime.
  # `variable` is the env var the app reads (must stay GEMINI_API_KEY);
  # `secret` is the Secret Manager secret NAME (changed to gemini-key).
  # Create it with:  firebase apphosting:secrets:set gemini-key
  - variable: GEMINI_API_KEY
    secret: gemini-key
    availability:
      - RUNTIME
