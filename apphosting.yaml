# Firebase App Hosting config for Finia (full-stack: Vite client + Express/Node server).
# App Hosting runs `npm run build` then `npm run start` (node dist/server.cjs),
# which serves the built client from dist/ AND the /api/* routes on $PORT.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0      # scale to zero when idle (cheapest); bump to 1 to kill cold starts
  maxInstances: 2
  concurrency: 80

env:
  # Production mode -> server.ts serves dist/ statically instead of the Vite dev middleware.
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # ---- Public Firebase web config ----
  # Vite inlines VITE_* into the CLIENT bundle at BUILD time, so these MUST be
  # present during build. They are public (shipped in the browser bundle anyway),
  # so plain values committed here are fine. Paste your values from .env.local.
  - variable: VITE_FIREBASE_API_KEY
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  - variable: VITE_FIREBASE_PROJECT_ID
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  - variable: VITE_FIREBASE_APP_ID
    value: REPLACE_WITH_VALUE_FROM_.env.local
    availability: [BUILD]
  # Web push VAPID key (only needed if you want FCM web push; safe to leave as-is if unused).
  - variable: VITE_FIREBASE_VAPID_KEY
    value: REPLACE_WITH_VALUE_OR_LEAVE_BLANK
    availability: [BUILD]

  # ---- Server-side secret ----
  # The Gemini key is used ONLY by the Express server (server.ts), at runtime.
  # It is NOT inlined into the client. Backed by Cloud Secret Manager.
  # Create it with:  firebase apphosting:secrets:set GEMINI_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
